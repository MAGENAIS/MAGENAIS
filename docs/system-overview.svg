<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="1000"
    viewBox="0 0 1600 1000">

<title>MAGENAIS System Overview</title>
<desc>
MAGENAIS Browser First AI Operating System Architecture
</desc>

<!-- ===================================================== -->
<!-- DEFINITIONS -->
<!-- ===================================================== -->

<defs>

    <!-- Background -->
    <linearGradient id="bgGradient"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">

        <stop offset="0%" stop-color="#08111F"/>
        <stop offset="50%" stop-color="#10243C"/>
        <stop offset="100%" stop-color="#1B3152"/>

    </linearGradient>

    <!-- Cards -->

    <linearGradient id="cardBlue"
                    x1="0"
                    y1="0"
                    x2="1"
                    y2="1">

        <stop offset="0%"
              stop-color="#2196F3"/>

        <stop offset="100%"
              stop-color="#1976D2"/>

    </linearGradient>


    <linearGradient id="cardPurple"
                    x1="0"
                    y1="0"
                    x2="1"
                    y2="1">

        <stop offset="0%"
              stop-color="#7C4DFF"/>

        <stop offset="100%"
              stop-color="#512DA8"/>

    </linearGradient>

    <linearGradient id="cardGreen"
                    x1="0"
                    y1="0"
                    x2="1"
                    y2="1">

        <stop offset="0%"
              stop-color="#00C853"/>

        <stop offset="100%"
              stop-color="#00897B"/>

    </linearGradient>

    <!-- Shadow -->

    <filter id="shadow"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%">

        <feDropShadow
                dx="0"
                dy="6"
                stdDeviation="8"
                flood-opacity="0.35"/>

    </filter>

    <!-- Arrow -->

    <marker id="arrow"
            markerWidth="12"
            markerHeight="12"
            refX="8"
            refY="4"
            orient="auto">

        <path
            d="M0,0 L8,4 L0,8 Z"
            fill="#66BBFF"/>

    </marker>

</defs>

<!-- ===================================================== -->
<!-- BACKGROUND -->
<!-- ===================================================== -->

<rect
    width="1600"
    height="1000"
    fill="url(#bgGradient)"/>

<!-- ===================================================== -->
<!-- TITLE -->
<!-- ===================================================== -->

<text
    x="800"
    y="70"
    text-anchor="middle"
    font-size="40"
    fill="white"
    font-family="Inter,Segoe UI,Arial"
    font-weight="700">

MAGENAIS

</text>

<text
    x="800"
    y="108"
    text-anchor="middle"
    font-size="20"
    fill="#D8E8FF"
    font-family="Inter,Segoe UI,Arial">

Browser-First AI Operating System

</text>

<!-- ===================================================== -->
<!-- USER INTERFACE -->
<!-- ===================================================== -->

