<rect x="1150" y="210" width="110" height="34" rx="12" fill="#1565C0"/>
<text x="1205" y="232" text-anchor="middle">Projects</text>

<rect x="1280" y="210" width="90" height="34" rx="12" fill="#1565C0"/>
<text x="1325" y="232" text-anchor="middle">Assets</text>

</g>

<!-- Down Arrow -->

<line
    x1="800"
    y1="270"
    x2="800"
    y2="335"
    stroke="#66BBFF"
    stroke-width="4"
    marker-end="url(#arrow)"/>
  <!-- ===================================================== -->
<!-- KERNEL -->
