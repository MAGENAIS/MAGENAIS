    height="120"
    rx="24"
    fill="url(#cardBlue)"
    filter="url(#shadow)"/>

<text
    x="800"
    y="188"
    text-anchor="middle"
    font-size="26"
    font-family="Inter"
    fill="white"
    font-weight="700">

USER INTERFACE

</text>

